<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Talk">
  <defs>
    <linearGradient id="talkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#talkBg)"/>
  <!-- podium -->
  <g transform="translate(300 220)" stroke="#e2e8f0" stroke-width="4" fill="#e2e8f0">
    <!-- mic -->
    <g fill="#fde68a" stroke="#fde68a">
      <rect x="-12" y="-110" width="24" height="60" rx="12"/>
      <path d="M-26 -60 A26 26 0 0 0 26 -60" fill="none" stroke-width="5"/>
      <line x1="0" y1="-34" x2="0" y2="-10" stroke-width="5"/>
      <line x1="-14" y1="-10" x2="14" y2="-10" stroke-width="5"/>
    </g>
    <!-- podium body -->
    <path d="M-70 10 L70 10 L60 110 L-60 110 Z" fill="#94a3b8" stroke="#cbd5e1"/>
    <rect x="-40" y="30" width="80" height="50" rx="4" fill="#1e293b" stroke="#cbd5e1"/>
  </g>
  <text x="300" y="360" fill="#e2e8f0" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-style="italic">Invited Talk</text>
</svg>
