<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Behavioral Change for Disaster Preparedness">
  <defs>
    <linearGradient id="behBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1530"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#behBg)"/>
  <!-- circular arrows representing change cycle -->
  <g transform="translate(300 200)" fill="none" stroke="#fbcfe8" stroke-width="6" stroke-linecap="round">
    <path d="M0 -100 A100 100 0 0 1 86.6 50" />
    <polygon points="86.6,50 100,30 70,42" fill="#fbcfe8" stroke="none"/>
    <path d="M-86.6 50 A100 100 0 0 1 0 -100" />
    <polygon points="0,-100 -15,-80 15,-80" fill="#fbcfe8" stroke="none"/>
    <path d="M86.6 50 A100 100 0 0 1 -86.6 50" />
    <polygon points="-86.6,50 -100,30 -70,42" fill="#fbcfe8" stroke="none"/>
  </g>
  <!-- center label -->
  <g transform="translate(300 200)" fill="#fde68a" font-family="Georgia, serif" text-anchor="middle">
    <text y="-6" font-size="20">Intent</text>
    <text y="22" font-size="20">→ Action</text>
  </g>
  <text x="300" y="370" fill="#e2e8f0" font-family="Georgia, serif" font-size="26" text-anchor="middle" font-style="italic">Behavioral Change for Preparedness</text>
</svg>
