bio: |
  Researcher specializing in **disaster economics**, **urban disaster prevention**,
  and **Business Continuity Planning (BCP)**. My work draws on large-scale empirical
  evidence — listed-firm financial data, consumer purchasing records, and structured
  field interviews — to understand how disasters affect businesses and communities,
  and how preparedness measures translate into measurable resilience.

  **Available for invited talks and international research collaboration.**

