bio: |
  I am a researcher specializing in **disaster economics**, **urban disaster resilience**, and **industrial disaster resilience**.
  My research aims to study the impact of disasters on businesses, local communities, and regional economies, and to guide behavioral changes toward resilience.
  In recent years, I have been working to derive insights aimed at policy implementation through empirical analysis using large-scale data.

