bio: |
  **防災経済学**、**都市防災**、および**事業継続計画（BCP）**を専門とする研究者です。
  災害が企業や地域社会に与える影響と、防災対策がどのように測定可能なレジリエンスへとつながるかを研究しています。
  近年は大規模なデータを用いた実証的な分析を通じ、政策に実装できる知見の導出を目指しています。

