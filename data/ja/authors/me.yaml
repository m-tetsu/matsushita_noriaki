bio: |
  <p style="font-size:1.35rem; font-weight:700; color:#1E63B8; margin:0 0 1rem 0; line-height:1.35;">
  Economic and Behavioral Drivers of Disaster Resilience
  </p>

  **防災経済学**、**都市防災**、および**産業防災**を専門とする研究者です。
  災害が企業や地域社会・地域経済に与える影響と、レジリエンスに向けた行動変容へとつながる研究を目指しています。
  近年は大規模なデータを用いた実証的な分析を通じ、政策実装を目指した知見の導出に取り組んでいます。

